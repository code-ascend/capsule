name: Refresh utils.tar.gz

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - main
    paths:
      - 'scripts/create-utils.sh'
      - '.forgejo/workflows/build-utils.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build utils.tar.gz from ALT packages
    runs-on: alt-sisyphus

    steps:
      - name: Install runtime utils + tools
        run: |
          apt-get update
          apt-get install -y \
              bubblewrap squashfuse squashfs-tools unionfs \
              binutils git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build utils.tar.gz
        run: |
          chmod +x scripts/create-utils.sh
          ./scripts/create-utils.sh

      - name: Show diff
        run: |
          git status
          git diff --stat -- internal/runtime/bundle/files/utils.tar.gz || true

      - name: Commit and push
        run: |
          if git diff --quiet -- internal/runtime/bundle/files/utils.tar.gz; then
              echo "No changes to commit."
              exit 0
          fi
          git config user.name  "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@noreply.localhost"
          git add internal/runtime/bundle/files/utils.tar.gz
          git commit -m "chore(utils): refresh utils.tar.gz from ALT packages"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
