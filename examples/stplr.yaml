image: registry.altlinux.org/sisyphus/base:latest
output: ~/.local/bin/stplr_capsule
compression: zstd
cc: gcc
launch: yandex-browser
export:
  apps:
    - desktop: /usr/share/applications/yandexmusic.desktop
      icon: yandexmusic
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/code.desktop
      icon: visual-studio-code
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/google-chrome.desktop
      icon: google-chrome
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/yandex-browser.desktop
      icon: yandex-browser
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/MAX.desktop
      icon: MAX
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/vk-messenger.desktop
      icon: vk-messenger
      name_suffix: " (Capsule)"
  binaries:
    - /usr/bin/yandex-disk
install:
  - name: deps
    run: |
      apt-get update
      apt-get install -y \
        libEGL libGL libGLES \
        libGLX-mesa libEGL-mesa mesa-dri-drivers \
        xorg-dri-intel xorg-dri-radeon xorg-dri-nouveau xorg-dri-swrast \
        libgbm libdrm \
        fontconfig fonts-ttf-dejavu xkeyboard-config \
        libalsa libpulseaudio pipewire-libs \
        libva libva-driver-intel libva-intel-media-driver
      apt-get install -y ca-certificates stplr wget
  - name: stplr
    run: |
      # TODO: remove after v0.0.30
      wget -qO- https://altlinux.space/stapler/stplr/releases/download/v0.0.30-alpha.0/stplr-0.0.30-alpha.0-linux-x86_64.tar.gz | tar -xzf - -C /usr/bin stplr
  - name: app
    run: |
      stplr config set firejailExclude '*'
      stplr config set hideFirejailExcludeWarning 1
      stplr repo add aides https://altlinux.space/aides-community/aides.git
      stplr install -i=false yandex-music visual-studio-code yandex-browser-stable yandex-disk max vk-messenger google-chrome-stable
  - name: cleanup
    run: |
      stplr fix
      apt-get clean
      rm -rf /var/lib/apt/lists/*
      rm -rf /var/cache/apt/*.bin
      mkdir -p /var/lib/apt/lists/partial
