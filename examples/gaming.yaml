image: docker.io/archlinux:latest
output: ~/.local/bin/gaming
compression: zstd
cc: gcc
launch: steam

env:
  unset:
    - DRI_PRIME
    - GIO_LAUNCHED_DESKTOP_FILE
    - GIO_LAUNCHED_DESKTOP_FILE_PID

export:
  apps:
    - desktop: /usr/share/applications/steam.desktop
      icon: steam
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/net.lutris.Lutris.desktop
      icon: net.lutris.Lutris
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/com.libretro.RetroArch.desktop
      icon: com.libretro.RetroArch
      name_suffix: " (Capsule)"
    - desktop: /usr/share/applications/org.prismlauncher.PrismLauncher.desktop
      icon: org.prismlauncher.PrismLauncher
      name_suffix: " (Capsule)"
  binaries:
    - /usr/bin/steam
    - /usr/bin/lutris
    - /usr/bin/retroarch
    - /usr/bin/prismlauncher

install:
  - name: init-pacman
    run: |
      pacman-key --init
      pacman-key --populate archlinux
      echo -e "\n[multilib]\nInclude = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
      pacman -Syu --noconfirm

  - name: locale
    run: |
      sed -i 's/#en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen
      sed -i 's/#ru_RU.UTF-8 UTF-8/ru_RU.UTF-8 UTF-8/' /etc/locale.gen
      locale-gen

  - name: graphics
    run: |
      pacman --noconfirm --needed -S \
        mesa lib32-mesa vulkan-radeon lib32-vulkan-radeon \
        vulkan-intel lib32-vulkan-intel \
        vulkan-icd-loader lib32-vulkan-icd-loader vulkan-mesa-layers \
        lib32-vulkan-mesa-layers libva-intel-driver lib32-libva-intel-driver \
        intel-media-driver mesa-utils vulkan-tools libva-utils lib32-mesa-utils

  - name: audio
    run: |
      pacman --noconfirm --needed -S \
        alsa-lib lib32-alsa-lib alsa-plugins lib32-alsa-plugins libpulse \
        lib32-libpulse alsa-utils pipewire lib32-pipewire pipewire-pulse \
        pipewire-jack lib32-pipewire-jack

  - name: display
    run: |
      pacman --noconfirm --needed -S \
        xorg-xwayland qt6-wayland wayland lib32-wayland qt5-wayland gamescope

  - name: wine
    run: |
      pacman --noconfirm --needed -S \
        wine-staging winetricks \
        freetype2 lib32-freetype2 libxrandr lib32-libxrandr libldap lib32-libldap \
        mpg123 lib32-mpg123 libxcomposite lib32-libxcomposite \
        libxi lib32-libxi libxinerama lib32-libxinerama \
        libxslt lib32-libxslt openal lib32-openal \
        gnutls lib32-gnutls giflib lib32-giflib \
        gst-plugins-base lib32-gst-plugins-base gst-plugins-good lib32-gst-plugins-good \
        libpng lib32-libpng v4l-utils lib32-v4l-utils \
        libgpg-error lib32-libgpg-error ncurses lib32-ncurses ocl-icd lib32-ocl-icd \
        libva lib32-libva sqlite lib32-sqlite gtk3 lib32-gtk3 \
        sdl2-compat lib32-sdl2-compat vkd3d lib32-vkd3d cabextract

  - name: tools
    run: |
      pacman --noconfirm --needed -S \
        gamemode lib32-gamemode mangohud lib32-mangohud \
        wget ttf-dejavu ttf-liberation \
        xterm python-protobuf libcanberra

  - name: prepare-bind-targets
    run: |
      mkdir -p /initrd                                                                                                                                                                                                                                
      mkdir -p /usr/share/steam/compatibilitytools.d 

  - name: apps
    run: |
      pacman --noconfirm --needed -S \
        steam lutris \
        prismlauncher jre17-openjdk \
        retroarch retroarch-assets-ozone \
        libretro-mgba libretro-gambatte libretro-nestopia libretro-beetle-psx-hw

  - name: cleanup
    run: |
      pacman -Scc --noconfirm
      rm -rf /var/cache/pacman/pkg/*
      rm -rf /tmp/* /var/tmp/*

update:
  - name: update packages
    run: |
      pacman -Syu --noconfirm
      pacman -Scc --noconfirm
      rm -rf /var/cache/pacman/pkg/*
