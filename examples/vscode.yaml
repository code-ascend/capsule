image: altlinux.space/dmitry/capsule-base/sisyphus:latest
output: ~/.local/bin/capsule_vscode
compression: zstd
host_exec: true
install:
  - name: update repos
    run: |
      apt-get update -y
  - name: stplr app
    run: |
      stplr ref
      stplr install -i=false aides/visual-studio-code
  - name: discover exports
    run: |
      /utils/generate-overrides
  - name: cleanup
    run: |
      /utils/cleanup
